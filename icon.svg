<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <pattern id="checker" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#e0e0e0"/>
      <rect width="7" height="7" fill="#fff"/>
      <rect x="7" y="7" width="7" height="7" fill="#fff"/>
    </pattern>
    <clipPath id="doc-clip">
      <path d="M32 12 L82 12 L96 26 L96 112 Q96 116 92 116 L36 116 Q32 116 32 112 Z"/>
    </clipPath>
  </defs>

  <!-- Color pie (12 wedges, 30 degrees each, radius 60) -->
  <g transform="translate(64,64)">
    <path d="M0,0 L0,-60 A60,60 0 0,1 30,-52" fill="#ff0000" stroke="none"/>
    <path d="M0,0 L30,-52 A60,60 0 0,1 52,-30" fill="#ff8800" stroke="none"/>
    <path d="M0,0 L52,-30 A60,60 0 0,1 60,0" fill="#ffdd00" stroke="none"/>
    <path d="M0,0 L60,0 A60,60 0 0,1 52,30" fill="#44dd00" stroke="none"/>
    <path d="M0,0 L52,30 A60,60 0 0,1 30,52" fill="#00cc88" stroke="none"/>
    <path d="M0,0 L30,52 A60,60 0 0,1 0,60" fill="#00bbdd" stroke="none"/>
    <path d="M0,0 L0,60 A60,60 0 0,1 -30,52" fill="#0088ff" stroke="none"/>
    <path d="M0,0 L-30,52 A60,60 0 0,1 -52,30" fill="#4444ff" stroke="none"/>
    <path d="M0,0 L-52,30 A60,60 0 0,1 -60,0" fill="#8800dd" stroke="none"/>
    <path d="M0,0 L-60,0 A60,60 0 0,1 -52,-30" fill="#cc00cc" stroke="none"/>
    <path d="M0,0 L-52,-30 A60,60 0 0,1 -30,-52" fill="#ee0066" stroke="none"/>
    <path d="M0,0 L-30,-52 A60,60 0 0,1 0,-60" fill="#ff0033" stroke="none"/>
  </g>

  <!-- Document shadow -->
  <path d="M36 16 L86 16 L100 30 L100 116 Q100 120 96 120 L40 120 Q36 120 36 116 Z" fill="rgba(0,0,0,0.15)"/>

  <!-- Checkerboard inside document shape -->
  <rect x="32" y="12" width="64" height="104" rx="4" fill="url(#checker)" clip-path="url(#doc-clip)"/>

  <!-- Document outline -->
  <path d="M32 12 L82 12 L96 26 L96 112 Q96 116 92 116 L36 116 Q32 116 32 112 Z" fill="none" stroke="#444" stroke-width="2.5"/>

  <!-- Folded corner -->
  <path d="M82 12 L82 26 L96 26" fill="#ddd" stroke="#444" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- SVG text -->
  <text x="64" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="28" fill="#2a6cb8">SVG</text>

  <!-- Small color swatches at bottom (centered) -->
  <rect x="42" y="86" width="12" height="12" rx="2" fill="#ffffff" stroke="#888" stroke-width="1.5"/>
  <rect x="58" y="86" width="12" height="12" rx="2" fill="#000000" stroke="#888" stroke-width="1.5"/>
  <rect x="74" y="86" width="12" height="12" rx="2" fill="#2a6cb8" stroke="#888" stroke-width="1.5"/>
</svg>
