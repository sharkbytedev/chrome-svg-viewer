<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SVG Viewer+</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  #svg-bg-toolbar-host { flex-shrink: 0; }
  #svg-bg-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  #svg-bg-container img {
    transform-origin: center center;
  }
</style>
</head>
<body>
  <div id="svg-bg-toolbar-host"></div>
  <div id="svg-bg-container">
    <img id="svg-img">
  </div>
  <script src="content.js"></script>
</body>
</html>
